server:
  port: 8080
  servlet:
    multipart:
      max-file-size: 25MB
      max-request-size: 30MB

spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:audiolistener}
    username: ${DB_USERNAME:audiolistener}
    password: ${DB_PASSWORD:audiolistener}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

# OpenAI configuration
openai:
  api-key: ${OPENAI_API_KEY:}
  model: ${OPENAI_MODEL:whisper-1}
  api-url: ${OPENAI_API_URL:https://api.openai.com/v1/audio/transcriptions}
  timeout-seconds: ${OPENAI_TIMEOUT:120}
  max-retries: ${OPENAI_MAX_RETRIES:2}

# Audio storage
audio:
  upload-dir: ${AUDIO_UPLOAD_DIR:./uploads}
  allowed-types: audio/mpeg,audio/wav,audio/ogg,audio/flac,audio/mp4,audio/webm,audio/x-m4a
  max-file-size-mb: 25

logging:
  level:
    com.audiolistener: DEBUG
    org.hibernate.SQL: WARN
