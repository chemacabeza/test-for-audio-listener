services:
  postgres:
    image: postgres:16-alpine
    container_name: audiolistener-db
    environment:
      POSTGRES_DB: audiolistener
      POSTGRES_USER: audiolistener
      POSTGRES_PASSWORD: audiolistener
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U audiolistener" ]
      interval: 5s
      timeout: 5s
      retries: 5

  whisper:
    build:
      context: ./backend-whisper
      dockerfile: Dockerfile
      network: host
    container_name: audiolistener-whisper
    # The models are ~1-2GB, giving Python RAM limits
    deploy:
      resources:
        limits:
          memory: 4G
    ports:
      - "8001:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      network: host
    container_name: audiolistener-backend
    ports:
      - "8080:8080"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: audiolistener
      DB_USERNAME: audiolistener
      DB_PASSWORD: audiolistener
      OPENAI_API_KEY: ${OPENAI_API_KEY:-local-offline-key}
      OPENAI_MODEL: base
      OPENAI_API_URL: http://whisper:8000/v1/audio/transcriptions
      AUDIO_UPLOAD_DIR: /app/uploads
    volumes:
      - uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      whisper:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      network: host
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8080/api
    container_name: audiolistener-frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8080/api
    depends_on:
      - backend

volumes:
  pgdata:
  uploads:
